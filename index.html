<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { HashRouter, Routes, Route, Link, useLocation } = window.ReactRouterDOM;

        const IconSvg = ({ children, size = 20, className = "" }) => (

        const Coffee = (p) => <IconSvg {...p}><path d="M17 8h1a4 4 0 1 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" /><line x1="6" x2="6" y1="2" y2="4" /><line x1="10" x2="10" y1="2" y2="4" /><line x1="14" x2="14" y1="2" y2="4" /></IconSvg>;

        const DashboardHome = () => (
            <div className="space-y-6 animate-fade-in">
                <div className="glass-panel p-6 sm:p-8 rounded-xl border border-slate-700 shadow-md">
                    <div className="flex items-center gap-3 mb-4">
                        <Coffee className="text-slate-400" size={24} />
                        <h2 className="text-xl font-bold text-white tracking-wide">Alice your CFO says</h2>
                    </div>
                    <p className="text-slate-400 text-lg leading-relaxed font-light">
                        <strong className="text-white font-semibold mx-1 border-b border-slate-600">Finance tip for the week:</strong> Review your 90-day active software licenses against actual user activity logs. Based on recent industry benchmarks, charities are losing an average of 15% of their operational tech budgets to "zombie subscriptions" that staff forget to cancel after a trial ends. Let's start the hunt in B3.
                    </p>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <Link to="/b1" className="block transition duration-200 hover:bg-slate-800/80 glass-panel p-6 rounded-xl border border-slate-700 group shadow-sm hover:border-slate-500">
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-xs font-mono font-bold tracking-widest text-slate-500 group-hover:text-slate-400 transition">B1: SUSTAINABILITY</span>

                        <h3 className="text-3xl font-black text-white mb-1 tracking-tight">Oct 2026</h3>

                    <Link to="/b2" className="block transition duration-200 hover:bg-slate-800/80 glass-panel p-6 rounded-xl border border-slate-700 group shadow-sm hover:border-slate-500">
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-xs font-mono font-bold tracking-widest text-slate-500 group-hover:text-slate-400 transition">B2: FUNDRAISING</span>

                        <h3 className="text-3xl font-black text-white mb-1 tracking-tight">3 Matches</h3>
                        <p className="text-slate-400 font-medium tracking-wide mb-3 text-sm">New Grants Found</p>
                        <p className="text-slate-500 text-xs leading-relaxed">High probability alignment with our youth programs.</p>
                    </Link>

                    <Link to="/b3" className="block transition duration-200 hover:bg-slate-800/80 glass-panel p-6 rounded-xl border border-slate-700 group shadow-sm hover:border-slate-500">
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-xs font-mono font-bold tracking-widest text-slate-500 group-hover:text-slate-400 transition">B3: COSTS</span>

                        <h3 className="text-3xl font-black text-white mb-1 tracking-tight">$420 <span className="text-lg text-slate-500 font-medium">/ mo</span></h3>
                        <p className="text-slate-400 font-medium tracking-wide mb-3 text-sm">Potential Savings</p>
                        <p className="text-slate-500 text-xs leading-relaxed">Anomaly detected: redundant SaaS subscriptions.</p>

                <div className="mt-6 pt-6 border-t border-slate-800/50">

                    </h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                        <a href="https://uantchern.github.io/charity-portal/question-stormer.html" target="_blank" className="block p-5 rounded-xl border border-slate-700/50 bg-slate-900/40 hover:bg-slate-800/60 transition group shadow-sm">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="text-accent-cyan p-1.5 bg-accent-cyan/10 rounded-lg group-hover:bg-accent-cyan/20 transition-colors"><MessageSquare size={16} /></div>
                                <h4 className="font-bold text-slate-200 text-sm">D1: Question Stormer</h4>
                            </div>
                            <p className="text-slate-500 text-xs leading-relaxed group-hover:text-slate-400 transition-colors">Challenge assumptions and break mental blocks with context-aware prompts.</p>
                        </a>
                        <a href="https://uantchern.github.io/charity-portal/wayfinder.html" target="_blank" className="block p-5 rounded-xl border border-slate-700/50 bg-slate-900/40 hover:bg-slate-800/60 transition group shadow-sm">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="text-accent-emerald p-1.5 bg-accent-emerald/10 rounded-lg group-hover:bg-accent-emerald/20 transition-colors"><Compass size={16} /></div>
                                <h4 className="font-bold text-slate-200 text-sm">D2: Wayfinder</h4>
                            </div>
                            <p className="text-slate-500 text-xs leading-relaxed group-hover:text-slate-400 transition-colors">Visualize the ecosystem via an interactive force-directed stakeholder map.</p>
                        </a>
                        <a href="https://uantchern.github.io/charity-portal/#/?open=d3" target="_blank" className="block p-5 rounded-xl border border-slate-700/50 bg-slate-900/40 hover:bg-slate-800/60 transition group shadow-sm">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="text-accent-orange p-1.5 bg-accent-orange/10 rounded-lg group-hover:bg-accent-orange/20 transition-colors"><Layers size={16} /></div>
                                <h4 className="font-bold text-slate-200 text-sm">D3: Survey</h4>
                            </div>
                            <p className="text-slate-500 text-xs leading-relaxed group-hover:text-slate-400 transition-colors">Automatically generate 6-question targeted pulse checks via WhatsApp.</p>
                        </a>
                        <a href="https://uantchern.github.io/charity-portal/analyzer.html" target="_blank" className="block p-5 rounded-xl border border-slate-700/50 bg-slate-900/40 hover:bg-slate-800/60 transition group shadow-sm">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="text-accent-purple p-1.5 bg-accent-purple/10 rounded-lg group-hover:bg-accent-purple/20 transition-colors"><BoxComponent size={16} /></div>

                            </div>

        );

        // B1 Component
        const B1Sustainability = () => {
            // Sliders
            const [cashOnHand, setCashOnHand] = useState(500000);
            const [expectedIn, setExpectedIn] = useState(250000);
            const [expectedOut, setExpectedOut] = useState(200000);

            // Drill down states
            const [showCashDetails, setShowCashDetails] = useState(false);
            const [showInDetails, setShowInDetails] = useState(false);
            const [showOutDetails, setShowOutDetails] = useState(false);

            // Breakdown values
            const [cashDetails, setCashDetails] = useState([{ id: 'main', label: 'Main Account', value: 450000 }, { id: 'fixed', label: 'Fixed Deposit', value: 48000 }, { id: 'petty', label: 'Petty Cash', value: 2000 }]);
            const [inDetails, setInDetails] = useState([{ id: 'ncss', label: 'NCSS Grants', value: 150000 }, { id: 'donors', label: 'Individual Donors', value: 50000 }, { id: 'foundations', label: 'Foundations', value: 50000 }]);
            const [outDetails, setOutDetails] = useState([{ id: 'salary', label: 'Staff Salaries', value: 120000 }, { id: 'rent', label: 'Rental', value: 60000 }, { id: 'utils', label: 'Utilities/Admin', value: 20000 }]);

            useEffect(() => {
                if (showCashDetails) setCashOnHand(cashDetails.reduce((a, b) => a + Number(b.value), 0));
            }, [cashDetails, showCashDetails]);

            useEffect(() => {
                if (showInDetails) setExpectedIn(inDetails.reduce((a, b) => a + Number(b.value), 0));
            }, [inDetails, showInDetails]);

            useEffect(() => {
                if (showOutDetails) setExpectedOut(outDetails.reduce((a, b) => a + Number(b.value), 0));
            }, [outDetails, showOutDetails]);

            const formatCurrency = (val) => new Intl.NumberFormat('en-SG', { style: 'currency', currency: 'SGD', maximumFractionDigits: 0 }).format(val);

            const netPosition = (cashOnHand + expectedIn) - expectedOut;
            const isSafe = netPosition >= Math.max(0, cashOnHand * 0.5);
            const isDanger = netPosition < 0;

            let fuelColor = "var(--accent-cyan)";
            if (isDanger) fuelColor = "#f43f5e";
            else if (isSafe) fuelColor = "#10b981";
            else fuelColor = "#f59e0b"; // Warning

            const baseTotalForPercentage = cashOnHand + expectedIn;
            const fuelPercentage = baseTotalForPercentage > 0 ? Math.max(0, Math.min(100, (netPosition / baseTotalForPercentage) * 100)) : 0;

            return (
                <div className="glass-panel p-6 sm:p-10 rounded-2xl animate-fade-in shadow-sm border border-slate-700">

                    <div className="flex flex-col gap-6 max-w-4xl mx-auto mb-10">

                            </div>
                            <input
                                type="range" min="0" max="2000000" step="10000"
                                value={cashOnHand}
                                onChange={(e) => !showCashDetails && setCashOnHand(Number(e.target.value))}
                                disabled={showCashDetails}
                                className="w-full h-2 rounded-full cursor-pointer accent-accent-cyan"
                                style={{ opacity: showCashDetails ? 0.6 : 1, cursor: showCashDetails ? "not-allowed" : "pointer", accentColor: "#06b6d4" }}
                            />

                            <button onClick={() => setShowCashDetails(!showCashDetails)} className="text-slate-400 hover:text-white mt-4 flex items-center gap-2 text-sm transition">
                                {showCashDetails ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
                                {showCashDetails ? "Use Master Slider instead" : "Wait, let me be more specific..."}
                            </button>
                            {showCashDetails && (
                                <div className="mt-4 grid gap-3 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                                    {cashDetails.map((item, idx) => (
                                        <div className="flex justify-between items-center gap-2" key={item.id}>
                                            <input type="text" value={item.label} onChange={(e) => { const newArr = [...cashDetails]; newArr[idx].label = e.target.value; setCashDetails(newArr); }} className="bg-transparent border-none text-slate-300 text-sm focus:outline-none focus:border-b focus:border-accent-cyan border-b border-dashed border-slate-600 w-40 p-1" />
                                            <div className="flex items-center gap-2 text-slate-400">
                                                <span>S$</span>
                                                <input type="number" min="0" value={item.value || ""} onChange={(e) => { const newArr = [...cashDetails]; newArr[idx].value = Number(e.target.value); setCashDetails(newArr); }} className="bg-slate-800 border border-slate-600 text-white p-1 px-2 rounded-md w-28 font-mono outline-none focus:border-accent-cyan transition-colors" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* SLIDER 2 */}
                        <div className="bg-slate-800/30 p-6 rounded-xl border border-accent-emerald/30 text-left">
                            <div className="flex justify-between items-center mb-4">
                                <span className="font-bold text-lg text-accent-emerald">Expected Money In <span className="text-sm text-slate-400 font-normal ml-2">(Next 6 Months)</span></span>
                                <span className="font-mono text-xl text-white">{formatCurrency(expectedIn)}</span>
                            </div>
                            <input
                                type="range" min="0" max="1000000" step="5000"
                                value={expectedIn}
                                onChange={(e) => !showInDetails && setExpectedIn(Number(e.target.value))}
                                disabled={showInDetails}
                                className="w-full h-2 rounded-full cursor-pointer accent-accent-emerald"
                                style={{ opacity: showInDetails ? 0.6 : 1, cursor: showInDetails ? "not-allowed" : "pointer", accentColor: "#10b981" }}
                            />

                            <button onClick={() => setShowInDetails(!showInDetails)} className="text-slate-400 hover:text-white mt-4 flex items-center gap-2 text-sm transition">
                                {showInDetails ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
                                {showInDetails ? "Use Master Slider instead" : "Wait, let me be more specific..."}
                            </button>
                            {showInDetails && (
                                <div className="mt-4 grid gap-3 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                                    {inDetails.map((item, idx) => (
                                        <div className="flex justify-between items-center gap-2" key={item.id}>
                                            <input type="text" value={item.label} onChange={(e) => { const newArr = [...inDetails]; newArr[idx].label = e.target.value; setInDetails(newArr); }} className="bg-transparent border-none text-slate-300 text-sm focus:outline-none focus:border-b focus:border-accent-cyan border-b border-dashed border-slate-600 w-40 p-1" />
                                            <div className="flex items-center gap-2 text-slate-400">
                                                <span>S$</span>
                                                <input type="number" min="0" value={item.value || ""} onChange={(e) => { const newArr = [...inDetails]; newArr[idx].value = Number(e.target.value); setInDetails(newArr); }} className="bg-slate-800 border border-slate-600 text-white p-1 px-2 rounded-md w-28 font-mono outline-none focus:border-accent-emerald transition-colors" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* SLIDER 3 */}
                        <div className="bg-slate-800/30 p-6 rounded-xl border border-accent-rose/30 text-left">
                            <div className="flex justify-between items-center mb-4">
                                <span className="font-bold text-lg text-accent-rose">Expected Money Out <span className="text-sm text-slate-400 font-normal ml-2">(Next 6 Months)</span></span>
                                <span className="font-mono text-xl text-white">{formatCurrency(expectedOut)}</span>
                            </div>
                            <input
                                type="range" min="0" max="1000000" step="5000"
                                value={expectedOut}
                                onChange={(e) => !showOutDetails && setExpectedOut(Number(e.target.value))}
                                disabled={showOutDetails}
                                className="w-full h-2 rounded-full cursor-pointer accent-accent-rose"
                                style={{ opacity: showOutDetails ? 0.6 : 1, cursor: showOutDetails ? "not-allowed" : "pointer", accentColor: "#f43f5e" }}
                            />

                            <button onClick={() => setShowOutDetails(!showOutDetails)} className="text-slate-400 hover:text-white mt-4 flex items-center gap-2 text-sm transition">
                                {showOutDetails ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
                                {showOutDetails ? "Use Master Slider instead" : "Wait, let me be more specific..."}
                            </button>
                            {showOutDetails && (
                                <div className="mt-4 grid gap-3 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
                                    {outDetails.map((item, idx) => (
                                        <div className="flex justify-between items-center gap-2" key={item.id}>
                                            <input type="text" value={item.label} onChange={(e) => { const newArr = [...outDetails]; newArr[idx].label = e.target.value; setOutDetails(newArr); }} className="bg-transparent border-none text-slate-300 text-sm focus:outline-none focus:border-b focus:border-accent-cyan border-b border-dashed border-slate-600 w-40 p-1" />
                                            <div className="flex items-center gap-2 text-slate-400">
                                                <span>S$</span>
                                                <input type="number" min="0" value={item.value || ""} onChange={(e) => { const newArr = [...outDetails]; newArr[idx].value = Number(e.target.value); setOutDetails(newArr); }} className="bg-slate-800 border border-slate-600 text-white p-1 px-2 rounded-md w-28 font-mono outline-none focus:border-accent-rose transition-colors" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* DASHBOARD RESULT */}
                    <div className="bg-slate-800/20 p-8 rounded-2xl border border-slate-700 text-center mb-8 max-w-4xl mx-auto">
                        <h3 className="text-slate-400 uppercase tracking-widest text-sm font-bold mb-6">6-Month Projected Fuel Gauge<br /><span className="text-xs opacity-60">{"(Assumes no additional top-ups beyond \"Money In\")"}</span></h3>
                        <div className="text-5xl sm:text-7xl font-black mb-4 drop-shadow-sm font-mono" style={{ color: fuelColor }}>
                            {formatCurrency(netPosition)}
